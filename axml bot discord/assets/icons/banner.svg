<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#050505"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FFFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#008080" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Decorative Grid -->
  <path d="M0 100H1200 M0 200H1200 M0 300H1200 M200 0V400 M400 0V400 M600 0V400 M800 0V400 M1000 0V400" stroke="#111" stroke-width="1"/>
  
  <!-- Background Glow -->
  <rect width="1200" height="400" fill="url(#grad1)"/>
  
  <!-- Abstract Synth Waves -->
  <path d="M0 250Q300 100 600 250T1200 250" stroke="#00FFFF" stroke-width="2" stroke-opacity="0.3" fill="none">
    <animate attributeName="d" dur="10s" repeatCount="indefinite" values="M0 250Q300 100 600 250T1200 250; M0 250Q300 350 600 250T1200 250; M0 250Q300 100 600 250T1200 250"/>
  </path>
  
  <!-- Branding Text -->
  <g filter="url(#glow)">
    <text x="600" y="180" text-anchor="middle" fill="#00FFFF" style="font-family: 'Segoe UI', Arial; font-weight: 800; font-size: 80px; letter-spacing: 12px; filter: drop-shadow(0 0 10px #00FFFF);">AXML STUDIO</text>
    <text x="600" y="240" text-anchor="middle" fill="#008080" style="font-family: 'Segoe UI', Arial; font-weight: 400; font-size: 24px; letter-spacing: 8px;">NEXT-GEN AI MUSIC PRODUCTION</text>
  </g>
  
  <!-- Decorative Corner Accents -->
  <path d="M20 20H100 M20 20V100" stroke="#00FFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M1100 380H1180 M1180 300V380" stroke="#00FFFF" stroke-width="4" stroke-linecap="round"/>
</svg>
